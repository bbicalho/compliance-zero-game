function winhash(x,y){return (Math.sin(x*127.1+y*311.7)*43758.5453)%1>0;}

  }else if(theme==='airport'){

    // Control tower
    const twrX=580-(cx*0.12|0);

      r(twrX,H-330,18,300,'#18222a');r(twrX-18,H-330,54,22,'#1e2c34');r(twrX-18,H-330,54,6,'#28383e');

    ctx.fillText('⚫  SIGILO ABSOLUTO DECRETADO  ⚫',W/2,H/2);ctx.textAlign='left';

    // Toffoli jatinho easter egg
    const jt2=(cx*0.025|0);

    ctx.fillStyle='#664488';ctx.font='5px monospace';ctx.fillText('Copa Libertadores →',W-115-jt2,40);
    // Marble STF floor
    r(0,H-32,W,32,'#d8d4c2');r(0,H-32,W,4,'#e0dcc8');
    for(let i=0;i<W;i+=40)r(i,H-31,39,30,'#cdc9b5');
    ctx.strokeStyle='#bcb8a4';ctx.lineWidth=1;
    for(const [ax,ay,bx2,by2] of[[180,H-30,240,H-2],[460,H-30,520,H-4],[350,H-31,380,H-3]])
      {ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx2,by2);ctx.stroke();}

// ========== PLATFORMS ==========
function drawPlatform(p,cx,theme){
  const px=p.x-cx,py=p.y;
  if(px+p.w<-10||px>W+10)return;
  const fl=p.h>20;
  if(theme==='bank'){
    if(fl){r(px,py,p.w,p.h,'#162616');r(px,py,p.w,5,'#2a4a28');for(let i=0;i<p.w;i+=32)r(px+i,py,31,p.h,'#142414');}
    else{r(px,py,p.w,p.h,'#1a4a10');r(px,py,p.w,4,'#2a7a20');
      ctx.fillStyle='#1a5a10';ctx.font='bold 7px monospace';ctx.fillText('R$ R$ R$',px+4,py+10);}
  }else if(theme==='airport'){
    if(fl){r(px,py,p.w,p.h,'#0c100a');r(px,py,p.w,4,'#182018');for(let i=0;i<p.w;i+=28)r(px+i,py+1,16,2,'#ffff3035');}
    else{r(px,py,p.w,p.h,'#1a2828');r(px,py,p.w,3,'#283838');
      ctx.fillStyle='#3a5858';ctx.font='6px monospace';ctx.fillText('TERMINAL',px+2,py+10);}

function drawParticles(cx){

function spawnParts(x,y,col,n=10){
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=2+Math.random()*5;
    state.particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,life:35,maxLife:35,c:col,s:3+Math.random()*4|0});}
}

// ========== GAME LOGIC ==========
function updatePlayer(){
  const p=state.player;if(p.dead)return;
  const spd=p.onGround?2.8:2.2;
  if(keys['ArrowLeft']||keys['a']||keys['A']){p.vx-=spd*0.35;p.dir=-1;}
  else if(keys['ArrowRight']||keys['d']||keys['D']){p.vx+=spd*0.35;p.dir=1;}
  else p.vx*=p.onGround?0.72:0.88;
  p.vx=Math.max(-GX,Math.min(GX,p.vx));
  const jumpHeld=(keys['ArrowUp']||keys['w']||keys['W']||keys[' ']||keys['z']||keys['Z']);
  if(jumpHeld&&!p.jumpKeyHeld)p.jumpBuf=10;
  p.jumpKeyHeld=jumpHeld;
  p.jumpBuf=Math.max(0,p.jumpBuf-1);
  if(p.onGround)p.coyoteT=8;else p.coyoteT=Math.max(0,p.coyoteT-1);
  if(p.jumpBuf>0&&p.coyoteT>0){p.vy=JUMP;p.onGround=false;p.coyoteT=0;p.jumpBuf=0;}
  p.vy=Math.min(p.vy+GRAV,MAXFALL);p.x+=p.vx;p.y+=p.vy;
  p.onGround=false;
  for(const pl of state.platforms){
    const pr=p.x+27,pb=p.y+PCH,pl2=p.x+3;
    if(pr>pl.x&&pl2<pl.x+pl.w&&pb>pl.y&&p.y<pl.y+pl.h){
      if(p.vy>=0&&p.y<pl.y+pl.h){p.y=pl.y-PCH;p.vy=0;p.onGround=true;}
      else if(p.vy<0){p.y=pl.y+pl.h;p.vy=0;}
      else if(p.vx>0){p.x=pl.x-27;p.vx=0;}
      else if(p.vx<0){p.x=pl.x+pl.w-3;p.vx=0;}
    }
  }
  if(p.onGround&&Math.abs(p.vx)>0.5)p.ft++;
  if(p.y>H+60){die();return;}
  for(const e of state.enemies){
    if(!e.alive)continue;
    if(p.x+24>e.x+2&&p.x+3<e.x+26&&p.y+PCH>e.y&&p.y<e.y+ECH){
      if(p.vy>0&&p.y+PCH-14<e.y+ECH*0.38){
        e.alive=false;spawnParts(e.x+14,e.y+10,'#ff8040',14);
        p.vy=-8;score+=100;fgc=Math.min(fgc+1,41);updUI();
        posthog.capture('enemy_killed',{level:level,enemy_type:e.type});
        const m={lobista:'Lobista nocauteado! +100',cdb:'CDB destruído! +100',toga:'Toga derrubada! +100'};
        setMsg(m[e.type]||'+100');
      }else{die();return;}
    }
  }
  for(const s of state.cdbs){
    if(!s.alive)continue;
    if(p.x+22>s.x&&p.x+3<s.x+22&&p.y+PCH>s.y&&p.y<s.y+20){
      s.alive=false;coins++;score+=50;fgc=Math.min(fgc+1,41);
      spawnParts(s.x+10,s.y+8,'#2aff2a',8);updUI();
      posthog.capture('cdb_collected',{level:level,total_cdbs:coins});
    }
  }
  const g=state.goal;
  if(p.x+20>g.x&&p.x+3<g.x+38&&p.y+PCH>g.y-52&&p.y<g.y){winLevel();}
  const maxCX=state.platforms.reduce((m,pl)=>Math.max(m,pl.x+pl.w),0)-W;
  state.camX=Math.round(Math.max(0,Math.min(maxCX,p.x-W/2+80)));
}
function updateEnemies(){
  for(const e of state.enemies){
    if(!e.alive)continue;
    e.x+=e.vx;e.frame++;let gr=false;
    for(const pl of state.platforms){
      if(e.x+26>pl.x&&e.x+2<pl.x+pl.w&&e.y+ECH>pl.y&&e.y+ECH-8<pl.y+pl.h){
        e.y=pl.y-ECH;e.vy=0;gr=true;
        const lim=e.px!==undefined?{l:e.px,r:e.px+e.pw}:{l:pl.x,r:pl.x+pl.w};
        if(e.x<=lim.l||e.x+28>=lim.r)e.vx*=-1;
      }
    }
    if(!gr){e.vy=(e.vy||0)+GRAV;e.y+=e.vy;}
    if(e.y>H+80)e.alive=false;
  }
}
function updateParticles(){
  state.particles=state.particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life--;return p.life>0;});
}
function die(){
  if(dying)return;dying=true;dTimer=70;
  spawnParts(state.player.x+15,state.player.y+15,'#f0c090',18);
  state.player.dead=true;
  const m=['Seu CDB virou precatório...','A maleta do lobista te acertou!','O sigilo te engoliu!'];
  setMsg(m[level-1]||m[0]);
  posthog.capture('player_died',{level:level,lives_remaining:lives-1,score:score,cause:m[level-1]||m[0]});
}
function winLevel(){
  if(lvlWin)return;lvlWin=true;lvlTimer=90;
  score+=500;fgc=Math.min(fgc+3,41);updUI();
  setMsg(WINMSGS[level-1]||'FASE CONCLUÍDA!');
  posthog.capture('level_completed',{level:level,level_name:LVLNAMES[level-1],score:score,cdbs:coins,lives:lives});
}

function drawAll(){
  drawBg(state.camX,state.theme);
  for(const p of state.platforms)drawPlatform(p,state.camX,state.theme);
  for(const s of state.cdbs)drawCDB(s,state.camX);
  for(const e of state.enemies)drawEnemy(e,state.camX);
  drawGoal(state.goal,state.camX);
  drawParticles(state.camX);
}

let lastTime=0;
function loop(ts){
  const dt=Math.min((ts-lastTime)/16.67,3);lastTime=ts;
  if(gameOver){
    ctx.fillStyle='#05040a';ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    if(level>LEVELS.length){
      ctx.fillStyle='#2aff2a';ctx.font='bold 20px monospace';ctx.fillText('COMPLIANCE ZERO — MISSÃO CUMPRIDA!',W/2,H/2-60);
      ctx.fillStyle='#ffd700';ctx.font='13px monospace';ctx.fillText('Vorcaro preso. FGC pagou R$'+fgc+'bi.',W/2,H/2-28);
      ctx.fillStyle='#aaa';ctx.font='11px monospace';ctx.fillText('(Os ministros continuam sob "investigação"...)',W/2,H/2+0);
      ctx.fillStyle='#888';ctx.font='11px monospace';ctx.fillText('CDBs: '+coins+'   |   Pontuação: '+score,W/2,H/2+28);
    }else{
      ctx.fillStyle='#e03030';ctx.font='bold 22px monospace';ctx.fillText('OPERAÇÃO ENCERRADA',W/2,H/2-40);
      ctx.fillStyle='#ffd700';ctx.font='13px monospace';ctx.fillText('O Master levou seu dinheiro. Pontos: '+score,W/2,H/2-5);
      ctx.fillStyle='#888';ctx.font='12px monospace';ctx.fillText('Pressione ENTER para recorrer ao FGC',W/2,H/2+30);
    }
    ctx.textAlign='left';
    requestAnimationFrame(loop);return;
  }
  if(dying){
    dTimer--;updateParticles();drawAll();
    if(!state.player.dead)drawPlayer(state.player,state.camX);
    if(dTimer<=0){lives--;if(lives<=0){gameOver=true;posthog.capture('game_over',{result:'defeat',level:level,score:score,cdbs:coins});}else loadLevel(level);updUI();}
    requestAnimationFrame(loop);return;
  }
  if(lvlWin){
    lvlTimer--;updateParticles();drawAll();drawPlayer(state.player,state.camX);
    if(lvlTimer<=0){level++;if(level>LEVELS.length){gameOver=true;posthog.capture('game_over',{result:'victory',score:score,cdbs:coins,lives:lives});}else loadLevel(level);}
    requestAnimationFrame(loop);return;
  }
  for(const s of state.cdbs)if(s.alive)s.frame++;
  updatePlayer();updateEnemies();updateParticles();
  drawAll();
  if(!state.player.dead)drawPlayer(state.player,state.camX);
  requestAnimationFrame(loop);
}
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key==='Enter'&&gameOver)initGame();
  if([' ','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key))e.preventDefault();
});
document.addEventListener('keyup',e=>keys[e.key]=false);
initGame();requestAnimationFrame(loop);
</script></body></html>
